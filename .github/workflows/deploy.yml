name: Deploy with Docker Compose

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 下載程式碼
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 設定 Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. 登入 Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4. 建置並推送後端 (SignProcess API)
      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./approval-system-api
          file: ./approval-system-api/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/approval-system-api:latest
      
      # 5. 建置並推送前端 (React + Vite)
      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./approval-system-ui
          file: ./approval-system-ui/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_HUB_URL=${{ secrets.VITE_HUB_URL }}
          tags: ${{ secrets.DOCKER_USERNAME }}/approval-system-ui:latest

      # 6. 連線 AWS 並部署
      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          RDS_ENDPOINT: ${{ secrets.RDS_ENDPOINT }}
          JWT_KEY: ${{ secrets.JWT_KEY }}
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_SSH_KEY }}
          envs: DOCKER_USERNAME, DOCKER_PASSWORD, DB_PASSWORD, RDS_ENDPOINT, JWT_KEY
          script: |
            set -e
            echo "--- 開始部署流程 ---"

            # 登入 Docker
            echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin

            # 建立並進入專案資料夾
            mkdir -p ~/approvalsystem
            cd ~/approvalsystem

            # 產生環境專屬的 Nginx 設定檔
            cat > nginx.conf <<EOF
            server {
                listen 80;
                server_name approvalsystem.sytes.net;
                location /.well-known/acme-challenge/ {
                    root /var/www/certbot;
                }
                location / {
                    return 301 https://\$host\$request_uri;
                }
            }

            server {
                listen 443 ssl;
                server_name approvalsystem.sytes.net;

                ssl_certificate /etc/letsencrypt/live/approvalsystem.sytes.net/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/approvalsystem.sytes.net/privkey.pem;

                ssl_protocols TLSv1.2 TLSv1.3;
                ssl_prefer_server_ciphers on;

                location / {
                    root   /usr/share/nginx/html;
                    index  index.html index.htm;
                    try_files \$uri \$uri/ /index.html;
                }

                location /api {
                    proxy_pass http://web:8080;
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                    proxy_read_timeout 300;
                }

                location /hubs/ {
                    proxy_pass http://web:8080;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade \$http_upgrade;
                    proxy_set_header Connection "upgrade";
                    proxy_set_header Host \$host;
                    proxy_read_timeout 3600s;
                }
            }
            EOF

            # 產生 docker-compose.yml
            cat > docker-compose.yml <<EOF
            services:
              web:
                image: ${DOCKER_USERNAME}/approval-system-api:latest
                container_name: approval-system-api
                volumes:
                  - ./Logs:/app/Logs
                restart: always
                expose:
                  - 8080
                environment:
                  - ASPNETCORE_ENVIRONMENT=Production
                  - TZ=Asia/Taipei
                  - ConnectionStrings__DefaultConnection=Server=${RDS_ENDPOINT};Database=ApprovalSystem;User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=True;
                  - Jwt__Key=${JWT_KEY}
                networks:
                  - sign-net
              
              ui:
                image: ${DOCKER_USERNAME}/approval-system-ui:latest
                container_name: approval-system-ui
                restart: always
                ports:
                  - "80:80"
                  - "443:443"
                volumes:
                  - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
                  - /etc/letsencrypt:/etc/letsencrypt:ro
                environment:
                  - TZ=Asia/Taipei
                depends_on:
                  - web
                networks:
                  - sign-net
            
            networks:
              sign-net:
                driver: bridge
            EOF

            echo "--- 設定檔準備完成，開始更新容器 ---"
            docker compose pull
            docker compose up -d --remove-orphans
            
            # 清理舊的 Image 節省 EC2 空間
            docker image prune -f
            
            echo "--- 部署完成！網站已在 https://approvalsystem.sytes.net 上線 ---"