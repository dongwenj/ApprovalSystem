# 1. HTTP 伺服器 - 自動轉跳 HTTPS
server {
    listen 80;
    server_name approvalsystem.sytes.net; # 這裡換成你的網域

    # 提供給 Let's Encrypt 驗證用 (如果是用 Certbot 申請)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 強制所有流量轉向 HTTPS
    location / {
        return 301 https://\$host\$request_uri;
    }
}

# 2. HTTPS 伺服器 - 實際的業務邏輯
server {
    listen 443 ssl;
    server_name approvalsystem.sytes.net; # 這裡換成你的網域

    # SSL 憑證路徑 (這是 Let's Encrypt 的標準路徑)
    ssl_certificate /etc/letsencrypt/live/approvalsystem.sytes.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/approvalsystem.sytes.net/privkey.pem;

    # 安全性優化設定
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # 1. 處理前端靜態檔案
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files \$uri \$uri/ /index.html;
    }

    # 2. 處理後端 API 請求
    location /api {
        proxy_pass http://web:8080; 
        
        proxy_set_header Host \$host;
        proxy_set_header X-Real-IP \$remote_addr;
        proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto \$scheme;

        # 增加連線逾時設定，防止大檔案上傳中斷
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    }

    # 3. 處理 SignalR WebSocket (WSS)
    location /hubs/ {
        proxy_pass http://web:8080;

        proxy_http_version 1.1;
        proxy_set_header Upgrade \$http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host \$host;
        proxy_set_header X-Real-IP \$remote_addr;
        proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto \$scheme;

        # SignalR 必備的長連線逾時設定
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}